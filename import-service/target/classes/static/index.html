<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhap hang</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 30px; }
        .card { background: #fff; padding: 2rem; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; }
        h2 { margin-bottom: 1.5rem; color: #333; text-align: center; }
        h3 { margin: 1.2rem 0 0.8rem; color: #444; }
        .form-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .form-group { flex: 1; }
        label { display: block; margin-bottom: 4px; font-size: 13px; color: #555; }
        input, select, textarea { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #4a90e2; }
        table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        th { background: #4a90e2; color: #fff; padding: 8px; font-size: 13px; }
        td { padding: 6px 8px; border-bottom: 1px solid #eee; font-size: 13px; }
        td input { padding: 4px 8px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-add { background: #28a745; color: #fff; margin-top: 0.5rem; }
        .btn-remove { background: #dc3545; color: #fff; }
        .btn-submit { width: 100%; padding: 12px; background: #4a90e2; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 1.5rem; }
        .btn-submit:hover { background: #357abd; }
        .success { color: green; text-align: center; margin-top: 1rem; display: none; }
        .error { color: red; text-align: center; margin-top: 1rem; display: none; }
        .total { text-align: right; font-weight: bold; margin-top: 0.5rem; color: #333; }
    </style>
</head>
<body>
<div class="card">
    <h2>Tao phieu nhap hang</h2>

    <h3>Thong tin phieu</h3>
    <div class="form-row">
        <div class="form-group">
            <label>Ma phieu</label>
            <input type="text" id="importTicketId" placeholder="VD: IMP001" />
        </div>
        <div class="form-group">
            <label>Ngay nhap</label>
            <input type="date" id="date" />
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Nha cung cap</label>
            <select id="supplierId">
                <option value="">-- Dang tai... --</option>
            </select>
        </div>
        <div class="form-group">
            <label>Nguoi tao</label>
            <input type="text" id="createdBy" placeholder="VD: admin" />
        </div>
    </div>
    <div class="form-group" style="margin-bottom:1rem">
        <label>Ghi chu</label>
        <input type="text" id="note" placeholder="Ghi chu them..." />
    </div>

    <h3>Chi tiet san pham</h3>
    <table id="detailTable">
        <thead>
            <tr>
                <th>Ma SP</th>
                <th>Ten san pham</th>
                <th>So luong</th>
                <th>Don gia</th>
                <th>Thanh tien</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="detailBody"></tbody>
    </table>
    <div class="total" id="totalDisplay">Tong tien: 0 VND</div>
    <button class="btn btn-add" onclick="addRow()">+ Them san pham</button>

    <button class="btn-submit" onclick="submitImport()">Tao phieu nhap</button>
    <p class="success" id="successMsg">Tao phieu nhap thanh cong!</p>
    <p class="error" id="errorMsg">Co loi xay ra, vui long thu lai!</p>
</div>

<script>
    const SUPPLIER_URL = 'http://localhost:8082/api/suppliers';
    const PRODUCT_URL = 'http://localhost:8083/api/products';
    const IMPORT_URL = '/api/imports';

    // Load danh sach nha cung cap
    fetch(SUPPLIER_URL)
        .then(res => res.json())
        .then(data => {
            const select = document.getElementById('supplierId');
            select.innerHTML = '<option value="">-- Chon nha cung cap --</option>';
            data.forEach(s => {
                select.innerHTML += `<option value="${s.supplierId}">${s.name} (${s.supplierId})</option>`;
            });
        })
        .catch(() => {
            document.getElementById('supplierId').innerHTML = '<option value="">Khong the tai danh sach</option>';
        });

    // Set ngay hom nay mac dinh
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    let rowCount = 0;

    function addRow() {
        rowCount++;
        const tbody = document.getElementById('detailBody');
        const row = document.createElement('tr');
        row.id = 'row-' + rowCount;
        row.innerHTML = `
            <td><input type="text" id="pid-${rowCount}" placeholder="P001" oninput="calcRow(${rowCount})" /></td>
            <td><input type="text" id="pname-${rowCount}" placeholder="Ten san pham" /></td>
            <td><input type="number" id="qty-${rowCount}" placeholder="0" min="1" oninput="calcRow(${rowCount})" /></td>
            <td><input type="number" id="price-${rowCount}" placeholder="0" min="0" oninput="calcRow(${rowCount})" /></td>
            <td id="sub-${rowCount}">0</td>
            <td><button class="btn btn-remove" onclick="removeRow(${rowCount})">Xoa</button></td>
        `;
        tbody.appendChild(row);
    }

    function removeRow(id) {
        document.getElementById('row-' + id).remove();
        updateTotal();
    }

    function calcRow(id) {
        const qty = parseFloat(document.getElementById('qty-' + id)?.value) || 0;
        const price = parseFloat(document.getElementById('price-' + id)?.value) || 0;
        const sub = qty * price;
        document.getElementById('sub-' + id).textContent = sub.toLocaleString('vi-VN');
        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        document.querySelectorAll('[id^="sub-"]').forEach(el => {
            total += parseFloat(el.textContent.replace(/\./g, '').replace(',', '.')) || 0;
        });
        document.getElementById('totalDisplay').textContent = 'Tong tien: ' + total.toLocaleString('vi-VN') + ' VND';
    }

    function submitImport() {
        const details = [];
        let valid = true;

        document.querySelectorAll('[id^="row-"]').forEach(row => {
            const id = row.id.replace('row-', '');
            const productId = document.getElementById('pid-' + id)?.value?.trim();
            const productName = document.getElementById('pname-' + id)?.value?.trim();
            const quantity = parseInt(document.getElementById('qty-' + id)?.value);
            const unitPrice = parseFloat(document.getElementById('price-' + id)?.value);

            if (!productId || !quantity || !unitPrice) { valid = false; return; }
            details.push({ productId, productName, quantity, unitPrice });
        });

        if (!valid || details.length === 0) {
            alert('Vui long dien day du thong tin san pham!');
            return;
        }

        const dto = {
            importTicketId: document.getElementById('importTicketId').value.trim(),
            date: document.getElementById('date').value,
            supplierId: document.getElementById('supplierId').value,
            createdBy: document.getElementById('createdBy').value.trim(),
            note: document.getElementById('note').value.trim(),
            details
        };

        if (!dto.importTicketId || !dto.supplierId || !dto.createdBy) {
            alert('Vui long dien day du thong tin phieu!');
            return;
        }

        // Buoc 1: Luu phieu nhap truoc
        fetch(IMPORT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dto)
        })
        .then(res => {
            if (res.status !== 201) throw new Error('Luu phieu that bai');
            return res.json();
        })
        .then(() => {
            // Buoc 2: Sau khi luu phieu xong -> cap nhat san pham
            const productTasks = details.map(d =>
                fetch(`${PRODUCT_URL}/${d.productId}/exists`)
                    .then(res => res.json())
                    .then(exists => {
                        if (exists) {
                            return fetch(`${PRODUCT_URL}/${d.productId}/stock?quantity=${d.quantity}`, { method: 'PUT' });
                        } else {
                            return fetch(PRODUCT_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    productId: d.productId,
                                    productName: d.productName,
                                    price: d.unitPrice,
                                    unit: d.quantity
                                })
                            });
                        }
                    })
            );
            return Promise.all(productTasks);
        })
        .then(() => {
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        })
        .catch(() => {
            document.getElementById('errorMsg').style.display = 'block';
        });
    }
</script>
</body>
</html>

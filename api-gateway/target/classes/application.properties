spring.application.name=api-gateway
server.port=8080

# UserService: /api/users/**, /api/customers/**, /api/staff/**
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/customers/**,/api/staff/**

# SupplierService: /api/suppliers/**
spring.cloud.gateway.routes[1].id=supplier-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/suppliers/**

# ProductService: /api/products/**
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**

# ImportService: /api/imports/**
spring.cloud.gateway.routes[3].id=import-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/imports/**

# CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*

logging.pattern.console=%d{HH:mm:ss} | ${spring.application.name} | %highlight(%-5level) | %msg%n
logging.level.org.springframework.cloud.gateway=INFO

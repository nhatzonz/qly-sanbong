<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Customer Service</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; padding: 2.5rem 2rem; border-radius: 14px; box-shadow: 0 4px 24px rgba(74,144,226,0.12); width: 420px; border: 1px solid #eef2f7; }
        .card-header { text-align: center; margin-bottom: 1.75rem; }
        .card-header .icon { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #4a90e2, #6fb1fc); display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 26px; font-weight: bold; margin-bottom: 0.75rem; }
        h2 { color: #2c3e50; font-size: 22px; }
        .subtitle { font-size: 13px; color: #8898aa; margin-top: 4px; }
        .form-group { margin-bottom: 1.1rem; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #4a5568; font-weight: 600; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; background: #f9fbfd; transition: all 0.2s; }
        input:focus { outline: none; border-color: #4a90e2; background: #fff; box-shadow: 0 0 0 3px rgba(74,144,226,0.12); }
        input::placeholder { color: #b0bac9; font-style: italic; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #4a90e2, #357abd); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.75rem; transition: transform 0.15s, box-shadow 0.15s; }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,144,226,0.35); }
        .success { color: #28a745; text-align: center; margin-top: 1rem; font-size: 14px; display: none; }
        .error { color: #e74c3c; text-align: center; margin-top: 1rem; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="icon">+</div>
            <h2>Thêm khách hàng mới</h2>
            <p class="subtitle">Điền thông tin để tạo hồ sơ khách hàng</p>
        </div>
        <div class="form-group">
            <label>Mã khách hàng</label>
            <input type="text" id="idCustomer" placeholder="Nhập mã, ví dụ: KH001" />
        </div>
        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" id="name" placeholder="Nhập họ tên đầy đủ" />
        </div>
        <div class="form-group">
            <label>Số điện thoại</label>
            <input type="text" id="phone" placeholder="Nhập số điện thoại liên hệ" />
        </div>
        <div class="form-group">
            <label>Địa chỉ</label>
            <input type="text" id="address" placeholder="Nhập địa chỉ khách hàng" />
        </div>
        <button onclick="submitForm()">+ Thêm khách hàng</button>
        <p class="success" id="successMsg">✓ Thêm khách hàng thành công!</p>
        <p class="error" id="errorMsg">✗ Có lỗi xảy ra, vui lòng thử lại!</p>
    </div>

    <script>
        function submitForm() {
            const dto = {
                idCustomer: document.getElementById('idCustomer').value,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };

            fetch('/api/customers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dto)
            })
            .then(res => {
                if (res.status === 201) {
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('errorMsg').style.display = 'none';
                    document.getElementById('idCustomer').value = '';
                    document.getElementById('name').value = '';
                    document.getElementById('phone').value = '';
                    document.getElementById('address').value = '';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('successMsg').style.display = 'none';
                }
            })
            .catch(() => {
                document.getElementById('errorMsg').style.display = 'block';
            });
        }
    </script>
</body>
</html>

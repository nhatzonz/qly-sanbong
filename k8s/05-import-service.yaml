apiVersion: apps/v1
kind: Deployment
metadata:
  name: import-service
  namespace: qlysanbong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: import-service
  template:
    metadata:
      labels:
        app: import-service
    spec:
      containers:
        - name: import-service
          image: import-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-import:3306/import_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: SUPPLIER_SERVICE_URL
              value: http://supplier-service:8082
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:8083
---
apiVersion: v1
kind: Service
metadata:
  name: import-service
  namespace: qlysanbong
spec:
  type: NodePort
  selector:
    app: import-service
  ports:
    - port: 8084
      targetPort: 8084
      nodePort: 30084
